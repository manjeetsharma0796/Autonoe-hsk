<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Autonoe · Step 1 - Sharpen your intent</title>
<style>
  :root{
    --bg:#0a0d12;--surface:#11151c;--surface2:#0c1016;--border:#1e2530;
    --text:#e6e9ef;--muted:#8b93a1;--dim:#5b6473;
    --amber:#f5a623;--green:#22c55e;--red:#ef4444;--violet:#8b7bf0;
    --mono:"SF Mono",ui-monospace,Menlo,monospace;--sans:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 500px at 50% -10%,#15171f,var(--bg) 60%);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:720px;margin:0 auto;padding:26px}
  .head{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:6px}
  .step-num{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-weight:700;background:var(--amber);color:#000}
  .step-label{font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
  .step-title{font-weight:700;font-size:15px}
  .sub{font-size:12.5px;color:var(--dim);margin-left:auto;font-family:var(--mono)}

  .chat{display:flex;flex-direction:column;gap:20px;padding:22px 2px 8px}

  /* assistant turn - Claude style: NO avatar, plain flowing text */
  .aturn{align-self:stretch;max-width:100%;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}}
  .think{font-size:12px;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .think .chev{opacity:.6}
  .atext{font-size:15.5px;line-height:1.65;color:#e8ebf1}
  .atext code{font-family:var(--mono);font-size:13px;background:#1a212c;border:1px solid var(--border);border-radius:6px;padding:1px 6px;color:#f0c98a}
  .atext b{color:#fff}
  .caret{display:inline-block;width:7px;height:15px;background:var(--amber);margin-left:2px;vertical-align:-2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* user message - dark right bubble */
  .uturn{align-self:flex-end;max-width:80%}
  .uturn .bub{background:#13233a;border:1px solid #1d3354;border-radius:13px;border-top-right-radius:4px;padding:10px 14px;color:#dce7f6;font-weight:600;font-size:14px}

  /* answer options - sparkle/violet style, stacked like the reference */
  .options{display:flex;flex-direction:column;gap:9px;margin-top:14px;animation:rise .25s ease}
  .optrow{display:flex;align-items:center;gap:12px;background:#0e1320;border:1px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;transition:.13s;text-align:left;color:var(--text);font-size:14.5px;width:100%}
  .optrow:hover,.optrow:focus{border-color:var(--violet);background:#141a2b;outline:none;box-shadow:0 0 0 1px rgba(139,123,240,.35)}
  .optrow .spark{color:var(--violet);font-size:15px;flex:none}
  .optrow .sub{margin-left:auto;font-size:12px;color:var(--dim)}
  .optrow.warn:hover{border-color:var(--red);box-shadow:0 0 0 1px rgba(239,68,68,.3)}
  .optrow.warn .sub{color:var(--red)}
  /* always-present "type your own answer" - like Claude Code custom input */
  .ownrow{display:flex;align-items:center;gap:10px;background:#0c1118;border:1px dashed var(--border);border-radius:12px;padding:6px 8px 6px 16px;margin-top:2px}
  .ownrow .spark{color:var(--dim);font-size:14px}
  .ownrow input{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;outline:none;padding:7px 0}
  .ownrow input::placeholder{color:var(--dim)}
  .ownrow button{background:var(--violet);color:#0a0d12;font-weight:800;border:none;border-radius:9px;padding:8px 13px;cursor:pointer}

  /* inline dynamic chart inside an assistant turn */
  .inlinechart{margin-top:12px;background:linear-gradient(180deg,#0c1119,#0a0e15);border:1px solid var(--border);border-radius:14px;padding:14px 16px 6px}
  .ic-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
  .ic-title{font-size:13px;color:var(--text);font-weight:700}
  .ic-tf{color:var(--dim);font-weight:500;font-size:11px}
  .ic-delta{font-family:var(--mono);font-size:13.5px;font-weight:700;padding:2px 9px;border-radius:7px}
  .ic-delta.up{color:var(--green);background:rgba(34,197,94,.12)}
  .ic-delta.down{color:var(--red);background:rgba(239,68,68,.12)}
  .inlinechart svg{width:100%;height:auto;display:block}
  .ic-axis{font-family:var(--mono);font-size:9px;fill:var(--dim)}

  /* trade brief */
  .brief{align-self:stretch;background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:6px;animation:rise .3s ease}
  .brief h3{margin:0 0 4px;font-size:15px;color:var(--amber)}
  .brief .bsub{font-size:12px;color:var(--dim);margin-bottom:16px}
  .statement{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.3);border-radius:10px;padding:11px 13px;font-size:13.5px;line-height:1.5;margin-bottom:16px;color:#e9d9b8}
  .bgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .bf{background:#0c1118;border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .bf .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
  .bf .v{font-family:var(--mono);font-size:14px;margin-top:3px}
  .bf .v.amber{color:var(--amber)}.bf .v.green{color:var(--green)}.bf .v.red{color:var(--red)}
  .sources{margin-bottom:16px}.sources .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
  .pillrow{display:flex;gap:8px;flex-wrap:wrap}
  .ds{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--muted)}
  .ds .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .ds.on{border-color:rgba(245,166,35,.5);color:var(--text)}.ds.on .dot{background:var(--green);box-shadow:0 0 8px var(--green)}
  .brief .run{width:100%;background:var(--amber);color:#000;font-weight:800;border:none;border-radius:11px;padding:13px;font-size:14px;cursor:pointer}
  .restart{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;margin-top:10px;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="step-num">1</div>
    <div><div class="step-label">Step One</div><div class="step-title">New trade</div></div>
    <div class="sub" id="progress">1 / 8</div>
  </div>
  <div class="chat" id="chat"></div>
</div>

<script>
const QUESTIONS = [
  { id:'goal', think:'Reading your goal', q:"Hey - what are you trying to do?",
    opts:[ {v:'grow',label:'Grow my stack'},{v:'hedge',label:'Hedge a position'},{v:'scalp',label:'Quick scalp'},{v:'swing',label:'Swing trade'} ] },
  { id:'asset', think:'Picking the market', q:"Got it. Which asset are we looking at?", chart:true,
    opts:[ {v:'WMNT',label:'WMNT'},{v:'BTC',label:'BTC'},{v:'ETH',label:'ETH'},{v:'SOL',label:'SOL'},{v:'SUI',label:'SUI'} ] },
  { id:'capital', think:'Sizing the position', q:"How much are you putting in? Pick one or type an amount.",
    opts:[ {v:'$100',label:'$100'},{v:'$500',label:'$500'},{v:'$1,000',label:'$1,000'},{v:'$5,000',label:'$5,000'} ] },
  { id:'risk', q:"What's your risk appetite on this?",
    opts:[ {v:'low',label:'Low',sub:'protect capital'},{v:'med',label:'Medium',sub:'balanced'},{v:'high',label:'High',sub:'go for it'} ] },
  { id:'horizon', q:"Over what time horizon?",
    opts:[ {v:'intraday',label:'Intraday'},{v:'days',label:'A few days'},{v:'week',label:'~1 week'},{v:'month',label:'~1 month'} ] },
  { id:'type', q:"What kind of trade? You can use <code>spot</code>, <code>convert</code>, or simulated <code>leverage</code>.",
    opts:[ {v:'spot',label:'Spot buy / sell'},{v:'convert',label:'Convert'},{v:'leverage',label:'Leverage',sub:'simulated · risky',warn:true} ] },
  { id:'target', q:"What's your target on this trade?",
    opts:[ {v:'+$15',label:'+$15'},{v:'+5%',label:'+5%'},{v:'+10%',label:'+10%'},{v:'+25%',label:'+25%'} ] },
  { id:'stop', think:'Locking down risk', q:"Last one - how do you want to handle downside?",
    opts:[ {v:'tight',label:'Tight stop',sub:'cut fast'},{v:'wide',label:'Wide stop',sub:'room to breathe'},{v:'none',label:'No stop',sub:'⚠ risky',warn:true} ] },
];

const answers={}, LABELS={};
const chat=document.getElementById('chat');
const scroll=()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
const plain=h=>h.replace(/<[^>]+>/g,'');

function aTurn(thinkText){
  const t=document.createElement('div'); t.className='aturn';
  if(thinkText) t.innerHTML='<div class="think"><span class="chev">▸</span>'+thinkText+'</div>';
  const tx=document.createElement('div'); tx.className='atext'; t.appendChild(tx);
  chat.appendChild(t); scroll(); return {turn:t,text:tx};
}
function uTurn(text){const t=document.createElement('div');t.className='uturn';const b=document.createElement('div');b.className='bub';b.textContent=text;t.appendChild(b);chat.appendChild(t);scroll();}
function stream(node,text,speed=22){return new Promise(res=>{const w=text.split(' ');let i=0;const c=document.createElement('span');c.className='caret';node.appendChild(c);const t=setInterval(()=>{if(i>=w.length){clearInterval(t);c.remove();res();return;}c.insertAdjacentText('beforebegin',(i?' ':'')+w[i]);i++;scroll();},speed);});}

/* dynamic inline chart for "normal" questions */
function assetSeed(a){let s=0;for(const c of a)s+=c.charCodeAt(0);return s%7;}
let _icN=0;
function inlineChart(parent,assetLabel){
  const seed=assetSeed(assetLabel);
  const N=64,W=600,H=128,padL=12,padR=12,padT=14,padB=20;
  const pts=[];let v=50;for(let i=0;i<N;i++){v+=Math.sin(i/5+seed)*3.2+Math.sin(i/13+seed*1.7)*2+(seed-3)*0.35;pts.push(v);}
  const min=Math.min(...pts),max=Math.max(...pts),rng=(max-min)||1;
  const up=pts[N-1]>=pts[0], col=up?'#22c55e':'#ef4444';
  const sx=i=>padL+i/(N-1)*(W-padL-padR), sy=x=>padT+(1-(x-min)/rng)*(H-padT-padB);
  const line=pts.map((x,i)=>(i?'L':'M')+sx(i).toFixed(1)+' '+sy(x).toFixed(1)).join(' ');
  const area=line+` L ${sx(N-1).toFixed(1)} ${H-padB} L ${sx(0).toFixed(1)} ${H-padB} Z`;
  const delta=((pts[N-1]-pts[0])/pts[0]*100), id='icg'+(_icN++);
  const ex=sx(N-1).toFixed(1), ey=sy(pts[N-1]).toFixed(1);
  let grid='';for(let g=1;g<=2;g++){const y=(padT+g/3*(H-padT-padB)).toFixed(1);grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#161d27"/>`;}
  const box=document.createElement('div');box.className='inlinechart';
  box.innerHTML=`<div class="ic-head"><span class="ic-title">${assetLabel} <span class="ic-tf">· 48h · Bybit 1h</span></span>
      <span class="ic-delta ${up?'up':'down'}">${delta>=0?'+':''}${delta.toFixed(1)}%</span></div>
    <svg viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${col}" stop-opacity="0.30"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
      ${grid}
      <path d="${area}" fill="url(#${id})"/>
      <path d="${line}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${ex}" cy="${ey}" r="7" fill="${col}" opacity="0.18"/>
      <circle cx="${ex}" cy="${ey}" r="3.4" fill="${col}"/>
      <text class="ic-axis" x="${padL}" y="${H-6}">48h ago</text>
      <text class="ic-axis" x="${W-padR}" y="${H-6}" text-anchor="end">now</text>
    </svg>`;
  parent.appendChild(box);scroll();
}

async function ask(i){
  if(i>=QUESTIONS.length) return finish();
  document.getElementById('progress').textContent=`${i+1} / ${QUESTIONS.length}`;
  const q=QUESTIONS[i];
  const {turn,text}=aTurn(q.think);
  await stream(text,plain(q.q)); text.innerHTML=q.q;
  renderOptions(turn,i,q);
}
function renderOptions(turn,i,q){
  const wrap=document.createElement('div'); wrap.className='options';
  q.opts.forEach(o=>{
    const b=document.createElement('button'); b.className='optrow'+(o.warn?' warn':'');
    b.innerHTML=`<span class="spark">✦</span><span>${o.label}</span>${o.sub?`<span class="sub">${o.sub}</span>`:''}`;
    b.onclick=()=>choose(i,wrap,o.v,o.label);
    wrap.appendChild(b);
  });
  // ALWAYS-present "type your own answer" (Claude Code style)
  const own=document.createElement('div'); own.className='ownrow';
  own.innerHTML='<span class="spark">✎</span>';
  const inp=document.createElement('input'); inp.placeholder='…or type your own answer';
  const go=document.createElement('button'); go.textContent='Send';
  const submit=()=>{const v=inp.value.trim(); if(v) choose(i,wrap,v,v);};
  go.onclick=submit; inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  own.appendChild(inp); own.appendChild(go); wrap.appendChild(own);
  turn.appendChild(wrap); scroll();
}
async function choose(i,wrap,value,label){
  const q=QUESTIONS[i];
  answers[q.id]=value; LABELS[q.id]=label;
  wrap.remove(); uTurn(label);
  // dynamic chart turn for "normal" questions (e.g. after asset)
  if(q.chart){
    const {turn,text}=aTurn('Pulling '+label+' from Bybit');
    await stream(text,'Quick read on '+label+' before we size it - here is the recent action:');
    inlineChart(turn,label);
    await new Promise(r=>setTimeout(r,500));
  }
  setTimeout(()=>ask(i+1),300);
}

function suggestedSources(){const s=new Set(['Market','Indicators']);if(answers.type!=='leverage')s.add('On-chain');if(answers.horizon==='month'||answers.goal==='hedge')s.add('News');return s;}
function statement(){const a=answers;const g={grow:'grow my position in',hedge:'hedge',scalp:'scalp',swing:'swing trade'}[a.goal]||(a.goal+' on');return `I want to ${g} <b>${a.asset}</b> with <b>${LABELS.capital}</b>, a <b>${LABELS.risk}</b>-risk <b>${LABELS.type}</b> trade over <b>${LABELS.horizon}</b>, targeting <b>${a.target}</b> with a <b>${LABELS.stop}</b>.`;}

async function finish(){
  document.getElementById('progress').textContent='brief ready';
  const {text}=aTurn('Assembling your brief');
  await stream(text,"Got it - here's your brief. Tweak anything, then send it to the tribunal.");
  const card=document.createElement('div'); card.className='brief';
  const srcs=suggestedSources(), ALL=['On-chain','Market','Indicators','News'];
  card.innerHTML=`<h3>Trade brief</h3><div class="bsub">Auto-built from your answers · editable</div>
    <div class="statement">${statement()}</div>
    <div class="bgrid">
      <div class="bf"><div class="k">Asset</div><div class="v amber">${answers.asset}</div></div>
      <div class="bf"><div class="k">Capital</div><div class="v">${LABELS.capital}</div></div>
      <div class="bf"><div class="k">Risk</div><div class="v">${LABELS.risk}</div></div>
      <div class="bf"><div class="k">Horizon</div><div class="v">${LABELS.horizon}</div></div>
      <div class="bf"><div class="k">Trade type</div><div class="v ${answers.type==='leverage'?'red':''}">${LABELS.type}</div></div>
      <div class="bf"><div class="k">Target</div><div class="v green">${answers.target}</div></div>
    </div>
    <div class="sources"><div class="k">Data sources the agents will use (auto-suggested)</div>
      <div class="pillrow">${ALL.map(s=>`<div class="ds ${srcs.has(s)?'on':''}" data-s="${s}"><span class="dot"></span>${s}</div>`).join('')}</div></div>
    <button class="run">Run the tribunal →</button>
    <div style="text-align:center"><button class="restart">start over</button></div>`;
  chat.appendChild(card); scroll();
  card.querySelectorAll('.ds').forEach(p=>p.onclick=()=>p.classList.toggle('on'));
  card.querySelector('.run').onclick=()=>{const on=[...card.querySelectorAll('.ds.on')].map(d=>d.dataset.s);alert('→ Tribunal:\n\n'+card.querySelector('.statement').textContent+'\n\nSources: '+on.join(', '));};
  card.querySelector('.restart').onclick=()=>{for(const k in answers)delete answers[k];chat.innerHTML='';ask(0);};
}

ask(0);
</script>
</body>
</html>
