<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Autonoe · Judge Panel</title>
<style>
  :root{
    --bg:#0a0d12; --surface:#11151c; --surface2:#0c1016; --border:#1e2530;
    --text:#e6e9ef; --muted:#8b93a1; --dim:#5b6473;
    --amber:#f5a623; --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
    --mono:"SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;
    --sans:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 500px at 50% -10%,#15171f 0%,var(--bg) 60%);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1280px;margin:0 auto;padding:24px}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}

  .pill{font-size:11px;font-weight:700;letter-spacing:.1em;padding:5px 11px;border-radius:999px;background:rgba(245,166,35,.14);color:var(--amber);border:1px solid rgba(245,166,35,.4)}

  /* model-config header above the picker */
  .cfg-title{width:100%;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:18px 0 10px}

  .round{margin-bottom:30px}
  .round-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed var(--border)}
  .round-no{font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--amber);background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);padding:4px 10px;border-radius:7px}
  .round-intent{font-size:12px;color:var(--muted);font-style:italic;max-width:420px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .round-status{font-size:11px;color:var(--dim);font-weight:600}
  .modelchip{font-family:var(--mono);font-size:10.5px;color:var(--muted);background:#0a0e14;border:1px solid var(--border);padding:3px 8px;border-radius:6px;display:flex;gap:5px;align-items:center}
  .modelchip .d{width:7px;height:7px;border-radius:50%}

  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}
  @media(max-width:880px){.grid3{grid-template-columns:1fr}}
  .panel{background:linear-gradient(180deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-top-width:2px;border-radius:14px;display:flex;flex-direction:column;height:460px;overflow:hidden;transition:opacity .3s, box-shadow .3s}
  .panel.supporter{border-top-color:var(--green)}
  .panel.discriminator{border-top-color:var(--red)}
  .panel.judge{border-top-color:var(--amber)}
  .panel.waiting{opacity:.5}
  .panel.supporter.speaking{box-shadow:0 0 0 1px var(--green),0 0 26px rgba(34,197,94,.16)}
  .panel.discriminator.speaking{box-shadow:0 0 0 1px var(--red),0 0 26px rgba(239,68,68,.16)}
  .panel.judge.speaking{box-shadow:0 0 0 1px var(--amber),0 0 26px rgba(245,166,35,.16)}
  .p-head{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--border)}
  .dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  .supporter .dot{background:var(--green);color:var(--green)}
  .discriminator .dot{background:var(--red);color:var(--red)}
  .judge .dot{background:var(--amber);color:var(--amber)}
  .p-name{font-weight:700;font-size:14px}
  .p-role{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
  .state{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:5px;display:none;align-items:center;gap:4px;white-space:nowrap}
  .supporter .state{color:var(--green);background:rgba(34,197,94,.12)}
  .discriminator .state{color:var(--red);background:rgba(239,68,68,.12)}
  .judge .state{color:var(--amber);background:rgba(245,166,35,.12)}
  .state.pulse{animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.45}}
  .p-model{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);background:#0a0e14;border:1px solid var(--border);padding:3px 8px;border-radius:6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
  .msgs::-webkit-scrollbar{width:8px}.msgs::-webkit-scrollbar-thumb{background:#222a36;border-radius:8px}
  .msg{font-size:12.5px;line-height:1.55;padding:9px 12px;border-radius:10px;max-width:94%;color:#cdd3dd;background:#0c1118;border:1px solid var(--border)}
  .msg.agent{align-self:flex-start;border-top-left-radius:3px}
  .supporter .msg.agent{border-left:2px solid rgba(34,197,94,.5)}
  .discriminator .msg.agent{border-left:2px solid rgba(239,68,68,.5)}
  .judge .msg.agent{border-left:2px solid rgba(245,166,35,.5)}
  .msg.user{align-self:flex-end;background:#13233a;border:1px solid #1d3354;color:#dce7f6;border-top-right-radius:3px}
  .reply-to{font-size:10.5px;color:var(--dim);margin-bottom:5px;font-style:italic;border-left:2px solid var(--border);padding-left:7px}
  mark.hot{background:rgba(245,166,35,.2);color:var(--amber);border-radius:3px;padding:0 3px;font-weight:600;font-family:var(--mono)}
  .caret{display:inline-block;width:7px;height:14px;background:currentColor;margin-left:2px;vertical-align:-2px;animation:blink 1s steps(1) infinite;opacity:.8}
  .supporter .caret{color:var(--green)}.discriminator .caret{color:var(--red)}.judge .caret{color:var(--amber)}
  @keyframes blink{50%{opacity:0}}
  .verdict-bar{margin:10px 14px 0;padding:9px 12px;border-radius:9px;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.35);font-size:12px;font-weight:700;color:var(--amber);display:none;align-items:center;gap:8px}
  .p-input{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:#0a0e14}
  .p-input input{flex:1;background:#0c1118;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12.5px;padding:8px 10px;outline:none}
  .p-input button{background:#1a2230;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:0 12px;cursor:pointer;font-size:13px}
  .p-input button:hover{color:var(--text)}

  .card{background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
  .card-title{font-size:13px;letter-spacing:.04em;color:var(--amber);font-weight:700;margin-bottom:4px}
  .card-sub{font-size:11px;color:var(--dim);margin-bottom:14px}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .chip{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:#0c1118;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--muted);user-select:none}
  .chip .sw{width:11px;height:11px;border-radius:3px}
  .chip.off{opacity:.4}
  .chartbox{position:relative}
  svg.chart{width:100%;height:240px;display:block}
  .tip{position:absolute;pointer-events:none;background:#0a0e14;border:1px solid var(--amber);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:11px;color:var(--text);display:none;min-width:160px;box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:5}
  .tip b{color:var(--amber)}
  .tip .row{display:flex;justify-content:space-between;gap:14px;margin-top:3px}

  .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:880px){.opts{grid-template-columns:1fr}}
  .opt{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px;cursor:pointer;transition:.15s}
  .opt:hover{border-color:#3a4554}
  .opt.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber),0 8px 26px rgba(245,166,35,.12)}
  .opt-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .opt-id{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--muted)}
  .dir{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;display:flex;align-items:center;gap:4px}
  .dir.long{background:rgba(34,197,94,.16);color:var(--green)}
  .dir.short{background:rgba(239,68,68,.16);color:var(--red)}
  .kv{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
  .k{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
  .v{font-family:var(--mono);font-size:13px;margin-top:2px}
  .v.amber{color:var(--amber)}.v.green{color:var(--green)}.v.red{color:var(--red)}
  .miniinput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:4px 7px;margin-top:2px}
  .conf-wrap{margin-bottom:12px}
  .conf-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
  .conf-track{height:7px;background:#0c1118;border-radius:999px;overflow:hidden}
  .conf-fill{height:100%;background:linear-gradient(90deg,#f5a623,#f7c46b);border-radius:999px}
  .exec{width:100%;background:var(--amber);color:#000;font-weight:800;border:none;border-radius:9px;padding:10px;cursor:pointer;font-size:13px}
  .exec:hover{filter:brightness(1.06)}
  .disclaimer{display:flex;align-items:center;justify-content:center;gap:8px;font-size:11.5px;color:var(--dim);border-top:1px solid var(--border);padding-top:16px;margin-top:8px}

  /* Re-evaluate button (lives in #model-config under the picker) */
  .go-btn{background:var(--amber);color:#000;font-weight:800;border:none;border-radius:10px;padding:11px 20px;cursor:pointer;font-size:13px;letter-spacing:.03em;white-space:nowrap;margin-top:14px}
  .go-btn:hover{filter:brightness(1.07)}

  /* ============================================================= */
  /* ===== INLINED: shell.css ==================================== */
  /* ============================================================= */
  #flow-stepper {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 0 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    user-select: none;
  }
  .flow-step {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: .38;
    transition: opacity .25s;
  }
  .flow-step.active { opacity: 1; }
  .flow-step.done { opacity: .65; }
  .flow-step__num {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 800;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--dim);
    transition: background .25s, color .25s, border-color .25s;
    flex-shrink: 0;
  }
  .flow-step.active .flow-step__num {
    background: var(--amber);
    color: #000;
    border-color: var(--amber);
  }
  .flow-step.done .flow-step__num {
    background: rgba(245,166,35,.18);
    color: var(--amber);
    border-color: rgba(245,166,35,.4);
  }
  .flow-step__label {
    font-size: 10.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--dim);
    line-height: 1.1;
  }
  .flow-step__title {
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    line-height: 1.2;
  }
  .flow-step.active .flow-step__label { color: var(--muted); }
  .flow-step.done .flow-step__label { color: var(--dim); }
  .flow-stepper-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
    min-width: 20px;
    max-width: 60px;
  }
  #flow-step1,
  #flow-step2 { transition: opacity .3s; }
  #flow-step1.collapsed {
    background: linear-gradient(180deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #flow-step1.collapsed > *:not(#flow-summary) { display: none; }
  #flow-summary {
    display: none;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
    min-width: 0;
  }
  #flow-step1.collapsed #flow-summary { display: flex; }
  #flow-summary__intent {
    font-size: 13px;
    color: var(--text);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 480px;
  }
  #flow-summary__sources {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .flow-source-tag {
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: .08em;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(245,166,35,.12);
    color: var(--amber);
    border: 1px solid rgba(245,166,35,.35);
  }
  #flow-summary__edit {
    font-size: 11px;
    color: var(--dim);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    white-space: nowrap;
    background: none;
    border: none;
    padding: 0;
    font-family: var(--sans);
  }
  #flow-summary__edit:hover { color: var(--amber); }
  #flow-step2 { display: none; }
  #flow-step2.visible { display: block; }

  /* ============================================================= */
  /* ===== INLINED: intent.css ================================== */
  /* ============================================================= */
  .intent-panel {
    font-family: var(--sans, "Inter", system-ui, -apple-system, Roboto, sans-serif);
    background: linear-gradient(180deg, var(--surface, #11151c) 0%, var(--surface2, #0c1016) 100%);
    border: 1px solid var(--border, #1e2530);
    border-radius: 14px;
    padding: 22px 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    -webkit-font-smoothing: antialiased;
  }
  .intent-panel__label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--dim, #5b6473);
    margin: 0 0 6px;
    user-select: none;
  }
  .intent-panel__textarea {
    width: 100%;
    min-height: 96px;
    background: var(--surface2, #0c1016);
    border: 1px solid var(--border, #1e2530);
    border-radius: 10px;
    color: var(--text, #e6e9ef);
    font-family: var(--mono, "SF Mono", ui-monospace, "Roboto Mono", Menlo, monospace);
    font-size: 13px;
    line-height: 1.6;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    box-sizing: border-box;
    transition: border-color .18s;
  }
  .intent-panel__textarea::placeholder { color: var(--dim, #5b6473); }
  .intent-panel__textarea:focus {
    border-color: rgba(245, 166, 35, .45);
    box-shadow: 0 0 0 3px rgba(245, 166, 35, .07);
  }
  .intent-panel__sources {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .intent-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 13px 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--border, #1e2530);
    background: transparent;
    color: var(--muted, #8b93a1);
    font-family: var(--sans, system-ui);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .02em;
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
    user-select: none;
  }
  .intent-pill:hover {
    border-color: var(--muted, #8b93a1);
    color: var(--text, #e6e9ef);
  }
  .intent-pill.is-on {
    border-color: var(--amber, #f5a623);
    color: var(--text, #e6e9ef);
    background: rgba(245, 166, 35, .06);
  }
  .intent-pill__icon { font-size: 13px; line-height: 1; }
  .intent-pill__dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex: none;
    background: var(--dim, #5b6473);
    transition: background .15s, box-shadow .15s;
  }
  .intent-pill.is-on .intent-pill__dot {
    background: var(--green, #22c55e);
    box-shadow: 0 0 6px var(--green, #22c55e);
  }
  .intent-panel__generate {
    align-self: flex-start;
    background: var(--amber, #f5a623);
    color: #000;
    font-family: var(--sans, system-ui);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .04em;
    border: none;
    border-radius: 10px;
    padding: 11px 22px;
    cursor: pointer;
    transition: filter .15s, opacity .2s;
    line-height: 1;
  }
  .intent-panel__generate:hover:not(:disabled) { filter: brightness(1.08); }
  .intent-panel__generate:disabled {
    opacity: .38;
    cursor: not-allowed;
    filter: none;
  }

  /* ============================================================= */
  /* ===== INLINED: picker.css ================================== */
  /* ============================================================= */
  :root {
    --_tm-violet: #6d5fe6;
    --_tm-violet-dim: rgba(109,95,230,.18);
    --_tm-violet-border: rgba(109,95,230,.7);
  }
  .tm-picker {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text, #e6e9ef);
    background: var(--surface, #11151c);
    border: 1px solid var(--border, #1e2530);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 260px;
    box-sizing: border-box;
  }
  .tm-role-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2, #0c1016);
    border: 1px solid var(--border, #1e2530);
    border-radius: 9px;
    padding: 3px;
  }
  .tm-role-tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted, #8b93a1);
    background: transparent;
    border: none;
    outline: none;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .tm-role-tab:hover {
    color: var(--text, #e6e9ef);
    background: rgba(255,255,255,.05);
  }
  .tm-role-tab.active {
    background: var(--_tm-violet-dim);
    color: #a5a0f5;
    border: 1px solid var(--_tm-violet-border);
  }
  .tm-role-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex: none;
  }
  .tm-role-dot.supporter  { background: var(--green, #22c55e); box-shadow: 0 0 5px var(--green, #22c55e); }
  .tm-role-dot.discriminator { background: var(--red, #ef4444);  box-shadow: 0 0 5px var(--red, #ef4444); }
  .tm-role-dot.judge      { background: var(--amber, #f5a623); box-shadow: 0 0 5px var(--amber, #f5a623); }
  .tm-custom-badge {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: .06em;
    padding: 1px 5px;
    border-radius: 4px;
    background: rgba(109,95,230,.3);
    color: #a5a0f5;
    border: 1px solid rgba(109,95,230,.5);
    margin-left: 2px;
    text-transform: uppercase;
  }
  .tm-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--dim, #5b6473);
    margin-bottom: 4px;
  }
  .tm-provider-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .tm-provider-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 10px;
    background: var(--surface2, #0c1016);
    border: 1.5px solid var(--border, #1e2530);
    border-radius: 9px;
    cursor: pointer;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--muted, #8b93a1);
    font-family: var(--mono, "SF Mono", ui-monospace, monospace);
    outline: none;
    transition: border-color .15s, color .15s, background .15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tm-provider-chip:hover {
    border-color: rgba(109,95,230,.4);
    color: var(--text, #e6e9ef);
  }
  .tm-provider-chip.selected {
    border-color: var(--_tm-violet-border);
    background: var(--_tm-violet-dim);
    color: var(--text, #e6e9ef);
    box-shadow: 0 0 0 1px rgba(109,95,230,.25), 0 0 12px rgba(109,95,230,.1);
  }
  .tm-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex: none;
    transition: background .25s, box-shadow .25s;
  }
  .tm-status-dot.has-key {
    background: var(--green, #22c55e);
    box-shadow: 0 0 6px var(--green, #22c55e);
  }
  .tm-status-dot.no-key {
    background: var(--dim, #5b6473);
    box-shadow: none;
  }
  .tm-input {
    width: 100%;
    box-sizing: border-box;

  </div>

  <!-- Flow.init() injects #flow-stepper, #flow-step1 (with #intent-step + #model-config),

  <div id="rounds"></div>

  <div class="disclaimer">⚠ testnet · not financial advice · the agent never auto-executes - you confirm every trade</div>
</div>

<script>
/* ============================================================= */
/* ===== INLINED MODULE: picker.js (window.TribunalModels) ===== */
/* ============================================================= */
(function () {
  'use strict';

  const MOCK_MODELS = {
    groq:       ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant', 'mixtral-8x7b-32768'],
    mistral:    ['mistral-large-latest', 'mistral-medium-2505', 'mistral-small-latest'],
    nvidia:     ['nemotron-4-340b-instruct', 'llama-3.1-nemotron-70b'],
    openrouter: ['anthropic/claude-3.5-sonnet', 'meta-llama/llama-3.1-405b', 'qwen/qwen-2.5-72b'],
    gemini:     ['gemini-2.0-flash', 'gemini-1.5-pro', 'gemini-1.5-flash'],
  };

  const PROVIDERS = ['groq', 'mistral', 'nvidia', 'openrouter', 'gemini'];
  const ROLES     = ['supporter', 'discriminator', 'judge'];

  const state = {
    keys:   Object.fromEntries(PROVIDERS.map(p => [p, ''])),
    models: Object.fromEntries(PROVIDERS.map(p => [p, []])),
    roles: {
      supporter:     { provider: 'groq', model: '' },
      discriminator: { provider: 'groq', model: '' },
      judge:         { provider: 'groq', model: '' },
    },
    overridden: { supporter: false, discriminator: false, judge: false },
    activeRole: 'supporter',
    filterText: { supporter: '', discriminator: '', judge: '' },
  };

  let changeCallbacks = [];

  function emit() {
    const snapshot = getRoles();
    changeCallbacks.forEach(cb => { try { cb(snapshot); } catch(e) {} });
  }

  function getRoles() {
    return {
      supporter:     { ...state.roles.supporter },
      discriminator: { ...state.roles.discriminator },
      judge:         { ...state.roles.judge },
    };
  }

  function hasAnyKey() {
    return PROVIDERS.some(p => state.keys[p] !== '');
  }

  function onChange(cb) {
    changeCallbacks.push(cb);
  }

  function el(tag, cls, attrs) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (attrs) Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v));
    return e;
  }

  function txt(text) { return document.createTextNode(text); }

  let refs = {};

  function buildDOM(container) {
    container.innerHTML = '';
    const root = el('div', 'tm-picker');

    const tabBar = el('div', 'tm-role-tabs');
    refs.tabs = {};
    ROLES.forEach(role => {
      const btn = el('button', 'tm-role-tab' + (role === state.activeRole ? ' active' : ''));
      btn.type = 'button';
      const dot = el('span', 'tm-role-dot ' + role);
      btn.appendChild(dot);
      btn.appendChild(txt(role.charAt(0).toUpperCase() + role.slice(1)));
      const badge = el('span', 'tm-custom-badge');
      badge.textContent = 'custom';
      badge.style.display = 'none';
      btn.appendChild(badge);
      refs.tabs[role] = { btn, badge };
      btn.addEventListener('click', () => selectRole(role));
      tabBar.appendChild(btn);
    });
    root.appendChild(tabBar);

    const provLabel = el('div', 'tm-section-label');
    provLabel.textContent = 'Provider';
    root.appendChild(provLabel);

    const grid = el('div', 'tm-provider-grid');
    refs.chips = {};
    PROVIDERS.forEach(p => {
      const chip = el('button', 'tm-provider-chip');
      chip.type = 'button';
      const dot = el('span', 'tm-status-dot ' + (state.keys[p] ? 'has-key' : 'no-key'));
      chip.appendChild(dot);
      chip.appendChild(txt(p));
      refs.chips[p] = { chip, dot };
      chip.addEventListener('click', () => selectProvider(p));
      grid.appendChild(chip);
    });
    root.appendChild(grid);

    const keyLabel = el('div', 'tm-section-label');
    keyLabel.textContent = 'API Key';
    root.appendChild(keyLabel);

    const keyInput = el('input', 'tm-input tm-key-input');
    keyInput.type = 'password';
    keyInput.placeholder = 'paste API key';
    refs.keyInput = keyInput;

    keyInput.addEventListener('input', () => {
      const provider = activeRoleProvider();
      const val = keyInput.value.trim();
      state.keys[provider] = val;
      if (val) {
        state.models[provider] = [...MOCK_MODELS[provider]];
        ROLES.forEach(r => {
          if (state.roles[r].provider === provider && !state.roles[r].model) {
            state.roles[r].model = state.models[provider][0] || '';
          }
        });
        refs.chips[provider].dot.className = 'tm-status-dot has-key';
      } else {
        state.models[provider] = [];
        refs.chips[provider].dot.className = 'tm-status-dot no-key';
      }
      refreshModelList();
      refreshSummary();
      emit();
    });
    root.appendChild(keyInput);

    const filterLabel = el('div', 'tm-section-label');
    filterLabel.textContent = 'Model';
    root.appendChild(filterLabel);

    const filterInput = el('input', 'tm-input');
    filterInput.type = 'text';
    filterInput.placeholder = 'filter models…';
    refs.filterInput = filterInput;

    filterInput.addEventListener('input', () => {
      state.filterText[state.activeRole] = filterInput.value;
      refreshModelList();
    });
    root.appendChild(filterInput);

    const modelList = el('div', 'tm-model-list');
    refs.modelList = modelList;
    root.appendChild(modelList);

    const summary = el('div', 'tm-summary');
    refs.summaryRows = {};
    ROLES.forEach(role => {
      const row = el('div', 'tm-summary-row ' + role);
      const lbl = el('span', 'tm-summary-role');
      lbl.textContent = role.slice(0,3).toUpperCase();
      const val = el('span', 'tm-summary-val');
      refs.summaryRows[role] = val;
      row.appendChild(lbl);
      row.appendChild(val);
      summary.appendChild(row);
    });
    root.appendChild(summary);

    container.appendChild(root);

    syncChipSelection();
    refreshModelList();
    refreshSummary();
    syncKeyInput();
    syncFilterInput();
  }

  function activeRoleProvider() {
    return state.roles[state.activeRole].provider;
  }

  function selectRole(role) {
    state.activeRole = role;
    ROLES.forEach(r => {
      const { btn } = refs.tabs[r];
      btn.classList.toggle('active', r === role);
    });
    syncChipSelection();
    syncKeyInput();
    syncFilterInput();
    refreshModelList();
  }

  function selectProvider(provider) {
    const role = state.activeRole;
    state.roles[role].provider = provider;

    if (role === 'supporter' && !state.overridden.discriminator) {
      state.roles.discriminator.provider = provider;
    }
    if (role === 'supporter' && !state.overridden.judge) {
      state.roles.judge.provider = provider;
    }

    if (role !== 'supporter') {
      state.overridden[role] = true;
      refs.tabs[role].badge.style.display = '';
    }

    const available = state.models[provider];
    if (!available.includes(state.roles[role].model)) {
      state.roles[role].model = available[0] || '';
    }

    if (role === 'supporter') {
      ['discriminator', 'judge'].forEach(r => {
        if (!state.overridden[r]) {
          const av = state.models[provider];
          if (!av.includes(state.roles[r].model)) {
            state.roles[r].model = av[0] || '';
          }
        }
      });
    }

    syncChipSelection();
    syncKeyInput();
    syncFilterInput();
    refreshModelList();
    refreshSummary();
    emit();
  }

  function selectModel(model) {
    const role = state.activeRole;
    state.roles[role].model = model;

    if (role !== 'supporter') {
      state.overridden[role] = true;
      refs.tabs[role].badge.style.display = '';
    } else {
      ['discriminator', 'judge'].forEach(r => {
        if (!state.overridden[r]) {
          state.roles[r].provider = state.roles.supporter.provider;
          state.roles[r].model    = model;
        }
      });
    }

    refreshModelList();
    refreshSummary();
    emit();
  }

  function syncChipSelection() {
    const provider = state.roles[state.activeRole].provider;
    PROVIDERS.forEach(p => {
      refs.chips[p].chip.classList.toggle('selected', p === provider);
    });
  }

  function syncKeyInput() {
    const provider = state.roles[state.activeRole].provider;
    refs.keyInput.value = state.keys[provider];
  }

  function syncFilterInput() {
    refs.filterInput.value = state.filterText[state.activeRole] || '';
  }

  function refreshModelList() {
    const role     = state.activeRole;
    const provider = state.roles[role].provider;
    const current  = state.roles[role].model;
    const filter   = (state.filterText[role] || '').toLowerCase();
    const list     = state.models[provider] || [];

    const filtered = filter ? list.filter(m => m.toLowerCase().includes(filter)) : list;

    refs.modelList.innerHTML = '';

    if (filtered.length === 0) {
      const empty = el('div', 'tm-model-empty');
      empty.textContent = list.length === 0
        ? 'paste an API key to load models'
        : 'no models match filter';
      refs.modelList.appendChild(empty);
      return;
    }

    filtered.forEach(model => {
      const row = el('div', 'tm-model-row' + (model === current ? ' selected' : ''));
      const dot = el('span', 'tm-model-dot');
      row.appendChild(dot);
      row.appendChild(txt(model));
      row.addEventListener('click', () => selectModel(model));
      refs.modelList.appendChild(row);
    });
  }

  function refreshSummary() {
    ROLES.forEach(role => {
      const { provider, model } = state.roles[role];
      const val = refs.summaryRows[role];
      val.textContent = model ? provider + ' / ' + model : provider + ' / -';
    });
  }

  function mount(containerEl) {
    if (typeof containerEl === 'string') {
      containerEl = document.getElementById(containerEl);
    }
    if (!containerEl) throw new Error('TribunalModels.mount: container not found');
    buildDOM(containerEl);
  }

  window.TribunalModels = { mount, getRoles, hasAnyKey, onChange };

})();

(function (global) {
  "use strict";

  const EXAMPLE =
    "WMNT looks oversold after the testnet incentive cliff - is there a scaled long worth taking against mUSD?";

  const SOURCE_DEFS = [
    { key: "onchain",    label: "On-chain",   icon: "⛓",  defaultOn: true  },
    { key: "market",     label: "Market",     icon: "📈",  defaultOn: true  },
    { key: "indicators", label: "Indicators", icon: "🔬",  defaultOn: true  },
    { key: "news",       label: "News",       icon: "📰",  defaultOn: false },
  ];

  let _textarea      = null;
  let _generateBtn   = null;
  let _pillStates    = {};
  let _generateCb    = null;
  let _mounted       = false;

  SOURCE_DEFS.forEach(s => { _pillStates[s.key] = s.defaultOn; });

  function el(tag, attrs, ...children) {
    const node = document.createElement(tag);
    if (attrs) {
      Object.entries(attrs).forEach(([k, v]) => {
        if (k === "class") node.className = v;
        else if (k === "style") node.style.cssText = v;
        else node.setAttribute(k, v);
      });
    }
    children.forEach(c => {
      if (c == null) return;
      node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return node;
  }

  function label(text) {
    return el("p", { class: "intent-panel__label" }, text);
  }

  function buildPill(def) {
    const dot  = el("span", { class: "intent-pill__dot" });
    const icon = el("span", { class: "intent-pill__icon", "aria-hidden": "true" }, def.icon);
    const lbl  = el("span", {}, def.label);

    const pill = el("button",
      {
        class: "intent-pill" + (_pillStates[def.key] ? " is-on" : ""),
        type: "button",
        "data-source": def.key,
        "aria-pressed": String(_pillStates[def.key]),
      },
      icon, lbl, dot
    );

    pill.addEventListener("click", () => {
      _pillStates[def.key] = !_pillStates[def.key];
      const on = _pillStates[def.key];
      pill.classList.toggle("is-on", on);
      pill.setAttribute("aria-pressed", String(on));
    });

    return pill;
  }

  function buildPanel() {
    _textarea = el("textarea", {
      class: "intent-panel__textarea",
      rows:  "5",
      placeholder: EXAMPLE,
    });

    const intentSection = el("div", { class: "intent-panel__section" },
      label("YOUR INTENT"),
      _textarea
    );

    const pillRow = el("div", { class: "intent-panel__sources" });
    SOURCE_DEFS.forEach(def => pillRow.appendChild(buildPill(def)));

    const sourcesSection = el("div", { class: "intent-panel__section" },
      label("DATA SOURCES"),
      pillRow
    );

    _generateBtn = el("button", {
      class: "intent-panel__generate",
      type: "button",
    }, "Generate thesis");

    _generateBtn.addEventListener("click", () => {
      if (_generateCb) _generateCb();
    });

    return el("div", { class: "intent-panel" },
      intentSection,
      sourcesSection,
      _generateBtn
    );
  }

  const IntentStep = {
    mount(containerEl) {
      if (!containerEl) throw new Error("IntentStep.mount: containerEl is required");
      containerEl.innerHTML = "";
      containerEl.appendChild(buildPanel());
      _mounted = true;
    },

    getIntent() {
      return _textarea ? _textarea.value.trim() : "";
    },

    getSources() {
      return Object.entries(_pillStates)
        .filter(([, on]) => on)
        .map(([k]) => k);
    },

    /* getActiveSources() returns human labels for the shell summary chips.
       Shell expects this method; intent module natively exposes getSources()
       (keys), so this maps keys → labels. */
    getActiveSources() {
      const byKey = Object.fromEntries(SOURCE_DEFS.map(s => [s.key, s.label]));
      return Object.entries(_pillStates)
        .filter(([, on]) => on)
        .map(([k]) => byKey[k] || k);
    },

    onGenerate(cb) {
      _generateCb = typeof cb === "function" ? cb : null;
    },

    setGenerateEnabled(enabled) {
      if (_generateBtn) _generateBtn.disabled = !enabled;
    },
  };

  global.IntentStep = IntentStep;
})(window);

    const steps = [
      { n: '01', label: 'STEP ONE', title: 'Thesis' },
      { n: '02', label: 'STEP TWO', title: 'Judge Panel' },
    ];

    const bar = el('div', { id: 'flow-stepper' });

    steps.forEach((s, i) => {
      if (i > 0) {
        bar.appendChild(el('div', { className: 'flow-stepper-divider' }));
      }
      const step = el('div', { className: 'flow-step', id: 'flow-step-indicator-' + (i + 1) });
      const numBox = el('div', { className: 'flow-step__num' }, s.n);
      const textBox = el('div', {});
      textBox.appendChild(el('div', { className: 'flow-step__label' }, s.label));
      textBox.appendChild(el('div', { className: 'flow-step__title' }, s.title));
      step.appendChild(numBox);
      step.appendChild(textBox);
      bar.appendChild(step);
    });

    return bar;
  }

  function buildStep1() {
    const wrap = el('div', { id: 'flow-step1', className: 'expanded' });

    const summary = el('div', { id: 'flow-summary' });

    const sourcesSpan = el('span', { id: 'flow-summary__sources' });
    const editBtn = el('button', { id: 'flow-summary__edit' }, '✎ edit');

    summary.appendChild(intentSpan);
    summary.appendChild(sourcesSpan);
    summary.appendChild(editBtn);
    wrap.appendChild(summary);

    wrap.appendChild(el('div', { id: 'intent-step' }));
    wrap.appendChild(el('div', { id: 'model-config' }));

  function buildStep2(roundsEl) {
    const wrap = el('div', { id: 'flow-step2' });

  function setStepperActive(stepNumber) {
    [1, 2].forEach(n => {
      const ind = document.getElementById('flow-step-indicator-' + n);
      if (!ind) return;

      if (n === stepNumber) ind.classList.add('active');
      else if (n < stepNumber) ind.classList.add('done');

  }

    const step1 = document.getElementById('flow-step1');

    if (intentSpan) intentSpan.textContent = '“' + intent + '”';

      sourcesSpan.innerHTML = '';

        const tag = el('span', { className: 'flow-source-tag' }, label);

          if (step2El) step2El.classList.add('visible');

          if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }

          if (typeof onGenerate === 'function') onGenerate();
        });
      } else {
        console.warn('[Flow] window.IntentStep.onGenerate not found - Generate callback not wired.');
      }
    },
  };
})();

/* Provider labels for round-head chips & panel headers.
   The picker emits lowercase provider ids; map them to display labels. */
const PROVIDER_LABELS = {
  groq:'Groq', mistral:'Mistral', nvidia:'NVIDIA', openrouter:'OpenRouter', gemini:'Gemini',
};
function provLabel(id){ return PROVIDER_LABELS[id] || (id ? id.charAt(0).toUpperCase()+id.slice(1) : '-'); }

const ROLEMETA = [
  { key:'supporter',     name:'Supporter',     role:'Bull case', color:'#22c55e' },
  { key:'discriminator', name:'Discriminator', role:'Bear case', color:'#ef4444' },
  { key:'judge',         name:'Judge',         role:'Ruling',    color:'#f5a623' },
];

/* cfg shim - populated from window.TribunalModels.getRoles() at run time.
   The picker is now the single source of truth; this is just a snapshot
   holder so buildRound()/runRound() keep their old shape. */
const cfg = {
  supporter:     { provider:'groq',    model:'llama-3.3-70b-versatile' },
  discriminator: { provider:'groq',    model:'llama-3.3-70b-versatile' },
  judge:         { provider:'groq',    model:'llama-3.3-70b-versatile' },
};

/* Read the picker and build a display-ready snapshot. Falls back to the
   provider's first mock model / a placeholder when no key/model is chosen
   so the round chips never render "undefined". */
function snapshotRoles(){
  const FALLBACK = {
    groq:'llama-3.3-70b-versatile', mistral:'mistral-large-latest', nvidia:'nemotron-4-340b-instruct',
    openrouter:'anthropic/claude-3.5-sonnet', gemini:'gemini-2.0-flash',
  };
  const roles = (window.TribunalModels && window.TribunalModels.getRoles)
    ? window.TribunalModels.getRoles()
    : { supporter:{...cfg.supporter}, discriminator:{...cfg.discriminator}, judge:{...cfg.judge} };
  const snap = {};
  ROLEMETA.forEach(r=>{
    const sel = roles[r.key] || {};
    const provider = sel.provider || 'groq';
    const model = sel.model || FALLBACK[provider] || '(default)';
    snap[r.key] = { provider, model };
  });
  return snap;
}

/* current user intent - set by runEvaluation() from IntentStep */
let currentIntent = '';

/* opening statements (streamed in PARALLEL) */
const OPENING = {
  supporter:'Capitulation wick right after the cliff - sellers look done. RSI14 is at <mark class="hot">28</mark>; the last two sub-30 tags gave a <mark class="hot">6–9%</mark> relief leg. Depth is healthy, so a scaled long fills clean.',
  discriminator:'The bounce is on <mark class="hot">thin volume</mark> - a dead-cat tell, not accumulation. Supply sits at <mark class="hot">1.305</mark>; a failed retest flips it straight back to <mark class="hot">1.12</mark>.',
};
/* then TURN-TAKING debate (one at a time, each waits for the other) */
const DEBATE = [

  { who:'discriminator', replyTo:'“+38% volume”', text:'One bar is not a trend. In a downtrend RSI sits at <mark class="hot">28</mark> for days - oversold is not a buy. Until <mark class="hot">1.305</mark> breaks, this is short-the-rip.' },
  { who:'supporter',     replyTo:'“RSI 28”',      text:'Then size down and respect risk - scaled entry, stop under the wick at <mark class="hot">1.182</mark>. Risk ~5% to make 5–6%; the asymmetry still favours a long.' },
  { who:'discriminator', replyTo:'“stop 1.182”',  text:'Reduced size, fine. But <mark class="hot">1.305</mark> is invalidation, not target - trim into strength, kill it if the retest fails.' },
];
const RULING = 'Supporter wins the asymmetry; Discriminator wins on invalidation. Net: a reduced-size long with a hard stop under <mark class="hot">1.182</mark> and <mark class="hot">1.305</mark> as the kill line.';
const REPLY = {
  supporter:'Good question - on a fresh pull I would still ladder the entry and keep the stop under the wick.',
  discriminator:'Fair - I would halve size again and treat 1.305 as the hard invalidation, not a target.',

/* ---------- model-config: mount picker + re-evaluate button ---------- */
function buildConfigBar(){
  const host = document.getElementById('model-config');
  if(!host) return;
  host.innerHTML='';
  const title=document.createElement('div'); title.className='cfg-title';
  title.innerHTML='Tribunal models - pick a provider &amp; model per agent, then re-evaluate (each round runs fresh, blind to previous rounds)';
  host.appendChild(title);

  const pickerHost=document.createElement('div'); pickerHost.id='tm-root';
  host.appendChild(pickerHost);
  if(window.TribunalModels && window.TribunalModels.mount){
    window.TribunalModels.mount(pickerHost);
    // keep the cfg shim mirrored so anything reading cfg stays current
    if(window.TribunalModels.onChange){
      window.TribunalModels.onChange(snap=>{
        ROLEMETA.forEach(r=>{ if(snap[r.key]) cfg[r.key]={...snap[r.key]}; });
      });
    }
  }

  const go=document.createElement('button'); go.className='go-btn'; go.id='goBtn';
  go.textContent='⟳ Re-evaluate'; go.onclick=runEvaluation;
  host.appendChild(go);
}

/* ---------- data generators ---------- */
const N=48;
function ser(amp,drift,phase){const a=[];for(let i=0;i<N;i++){const t=i/(N-1);a.push(drift*t*100+amp*Math.sin(t*6+phase)+amp*0.5*Math.sin(t*13+phase));}return a;}
function makeSeries(seed){const o=seed*0.7;return{baseline:ser(1.2,0.06,0.4+o),OPT1:ser(2.0,0.32-seed*0.05,0.2+o),OPT2:ser(2.4,-0.10+seed*0.04,1.1+o),OPT3:ser(1.6,0.16+seed*0.03,2.0+o)};}
const COLORS={OPT1:'#22c55e',OPT2:'#ef4444',OPT3:'#3b82f6'};
const ENTRY={OPT1:1.243,OPT2:1.262,OPT3:1.238};
const BASE_OPTS=[
  {id:'OPT-1',key:'OPT1',dir:'long', size:500,entry:1.243,sl:1.182,tp:1.305,low:2.4, high:5.6,conf:66},
  {id:'OPT-2',key:'OPT2',dir:'short',size:300,entry:1.262,sl:1.305,tp:1.180,low:-1.1,high:3.2,conf:48},
  {id:'OPT-3',key:'OPT3',dir:'long', size:750,entry:1.238,sl:1.205,tp:1.352,low:0.8, high:6.1,conf:61},
];
function makeOpts(seed){return BASE_OPTS.map((o,i)=>{const d=[5,-3,4][i]*seed;return{...o,conf:Math.max(35,Math.min(92,o.conf+d))};});}

/* ---------- streaming helpers ---------- */
function autoscroll(b){b.scrollTop=b.scrollHeight;}
function plain(html){return html.replace(/<\/?mark[^>]*>/g,'');}
function stream(node,box,text,speed){return new Promise(res=>{const w=text.split(' ');let i=0;const c=document.createElement('span');c.className='caret';node.appendChild(c);const t=setInterval(()=>{if(i>=w.length){clearInterval(t);c.remove();res();return;}c.insertAdjacentText('beforebegin',(i?' ':'')+w[i]);i++;autoscroll(box);},speed);});}

function setState(el,role,state,label){
  const p=el.querySelector('.panel.'+role); if(!p)return;
  p.classList.remove('speaking','waiting');
  const b=p.querySelector('[data-state]');
  if(state==='speaking'){p.classList.add('speaking');b.textContent='● speaking';b.classList.remove('pulse');b.style.display='inline-flex';}
  else if(state==='waiting'){p.classList.add('waiting');b.textContent='… '+(label||'considering');b.classList.add('pulse');b.style.display='inline-flex';}
  else{b.style.display='none';b.classList.remove('pulse');}
}

async function streamInto(el,role,html,replyTo,speed){
  const box=el.querySelector(`.msgs[data-role="${role}"]`);
  const m=document.createElement('div'); m.className='msg agent';
  if(replyTo){const r=document.createElement('div');r.className='reply-to';r.textContent='↳ replying to: '+replyTo;m.appendChild(r);}
  const t=document.createElement('div'); m.appendChild(t);
  box.appendChild(m); autoscroll(box);
  await stream(t,box,plain(html),speed);
  t.innerHTML=html;
}

/* ---------- chart per round ---------- */
function initChart(roundEl,seed){
  const SER=makeSeries(seed);
  const svg=roundEl.querySelector('svg.chart'), tip=roundEl.querySelector('.tip'), legend=roundEl.querySelector('.legend');
  const W=900,H=240,P={t:16,r:16,b:36,l:48},IW=W-P.l-P.r,IH=H-P.t-P.b;
  const vals=[...SER.baseline,...SER.OPT1,...SER.OPT2,...SER.OPT3];
  const yMin=Math.min(...vals)-2,yMax=Math.max(...vals)+2;
  const sx=i=>P.l+(i/(N-1))*IW, sy=v=>P.t+IH-((v-yMin)/(yMax-yMin))*IH;
  const pathOf=a=>a.map((v,i)=>(i?'L':'M')+sx(i).toFixed(1)+' '+sy(v).toFixed(1)).join(' ');
  const vis={OPT1:true,OPT2:true,OPT3:true};
  function draw(){
    let g='';
    for(let i=0;i<=4;i++){const y=P.t+IH*i/4;g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#1a212c"/>`;}
    g+=`<line x1="${P.l}" y1="${sy(0)}" x2="${W-P.r}" y2="${sy(0)}" stroke="#33414f" stroke-dasharray="2,4"/>`;
    g+=`<path d="${pathOf(SER.baseline)}" fill="none" stroke="#5b6473" stroke-width="1.6" stroke-dasharray="5,5"/>`;
    ['OPT1','OPT2','OPT3'].forEach(k=>{if(vis[k])g+=`<path d="${pathOf(SER[k])}" fill="none" stroke="${COLORS[k]}" stroke-width="2.2"/>`;});
    for(let i=0;i<=4;i++){const v=yMax-(yMax-yMin)*i/4;const y=P.t+IH*i/4;g+=`<text x="${P.l-8}" y="${y+3}" text-anchor="end" font-size="10" fill="#5b6473" font-family="monospace">${v>0?'+':''}${v.toFixed(0)}%</text>`;}
    const XL=["06-11 00:00","06-11 12:00","06-12 00:00","06-12 12:00","06-13 00:00","06-13 12:00"];
    XL.forEach((lab,j)=>{const i=Math.round(j/(XL.length-1)*(N-1));const x=sx(i);const anc=j===0?'start':(j===XL.length-1?'end':'middle');g+=`<text x="${x}" y="${H-18}" text-anchor="${anc}" font-size="9.5" fill="#5b6473" font-family="monospace">${lab}</text>`;});
    g+=`<text x="${(P.l+W-P.r)/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#4a5360" letter-spacing="1.5">TIME · 1h BARS · BYBIT MNTUSDT</text>`;
    const ym=P.t+IH/2;g+=`<text x="13" y="${ym}" text-anchor="middle" font-size="9" fill="#4a5360" letter-spacing="1.5" transform="rotate(-90 13 ${ym})">RETURN %</text>`;
    svg.innerHTML=g;
  }
  draw();
  svg.addEventListener('mousemove',e=>{const r=svg.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*W;if(x<P.l||x>W-P.r){tip.style.display='none';return;}const i=Math.round((x-P.l)/IW*(N-1));if(i<0||i>=N){tip.style.display='none';return;}let rows='';['OPT1','OPT2','OPT3'].forEach(k=>{if(!vis[k])return;const p=SER[k][i];rows+=`<div class="row"><span style="color:${COLORS[k]}">${k.replace('OPT','Option ')}</span><span>@${ENTRY[k]} · ${p>=0?'+':''}${p.toFixed(2)}%</span></div>`;});tip.innerHTML=`<b>Bar ${i+1}/${N}</b>${rows}`;tip.style.display='block';tip.style.left=Math.min(e.clientX-r.left+14,r.width-170)+'px';tip.style.top=Math.max(e.clientY-r.top-10,0)+'px';});
  svg.addEventListener('mouseleave',()=>tip.style.display='none');
  ['OPT1','OPT2','OPT3'].forEach(k=>{const c=document.createElement('div');c.className='chip';c.innerHTML=`<span class="sw" style="background:${COLORS[k]}"></span>${k.replace('OPT','Option ')}`;c.onclick=()=>{vis[k]=!vis[k];c.classList.toggle('off',!vis[k]);draw();};c.ondblclick=()=>{['OPT1','OPT2','OPT3'].forEach(o=>vis[o]=(o===k));legend.querySelectorAll('.chip').forEach((ch,ci)=>ch.classList.toggle('off',!vis[['OPT1','OPT2','OPT3'][ci]]));draw();};legend.appendChild(c);});
}

/* ---------- options per round ---------- */
function renderOpts(roundEl,seed){
  const opts=makeOpts(seed); const box=roundEl.querySelector('.opts'); let sel=opts[0].id;
  function paint(){
    box.innerHTML='';
    opts.forEach(o=>{
      const card=document.createElement('div');card.className='opt'+(o.id===sel?' sel':'');card.onclick=()=>{sel=o.id;paint();};
      card.innerHTML=`
        <div class="opt-head"><span class="opt-id">${o.id}</span>
          <span class="dir ${o.dir}">${o.dir==='long'?'▲':'▼'} ${o.dir.toUpperCase()}</span></div>
        <div class="kv">
          <div><div class="k">Size (mUSD)</div><input class="miniinput v amber" type="number" value="${o.size}" onclick="event.stopPropagation()"/></div>
          <div><div class="k">Entry</div><div class="v">${o.entry.toFixed(3)}</div></div>
          <div><div class="k">Stop-loss</div><input class="miniinput v red" type="number" step="0.001" value="${o.sl.toFixed(3)}" onclick="event.stopPropagation()"/></div>
          <div><div class="k">Take-profit</div><div class="v green">${o.tp.toFixed(3)}</div></div>
        </div>
        <div style="margin-bottom:12px"><div class="k">Predicted band</div><div class="v">${o.low>=0?'+':''}${o.low}% → +${o.high}%</div></div>
        <div class="conf-wrap"><div class="conf-top"><span class="k" style="color:var(--muted)">Confidence</span><span class="num" style="color:var(--amber);font-weight:700">${o.conf}%</span></div><div class="conf-track"><div class="conf-fill" style="width:${o.conf}%"></div></div></div>
        <button class="exec" onclick="event.stopPropagation();alert('Execute ${o.id}: ${o.dir} '+this.closest('.opt').querySelector('.miniinput').value+' mUSD @ ${o.entry}')">EXECUTE</button>`;
      box.appendChild(card);
    });
  }
  paint();
  return opts;
}

/* ---------- build + run a round ---------- */
let roundCount=0;
function buildRound(n,snap,intent){
  const el=document.createElement('div'); el.className='round';
  const chips=ROLEMETA.map(r=>`<span class="modelchip"><span class="d" style="background:${r.color}"></span>${r.name}: ${provLabel(snap[r.key].provider)} · ${snap[r.key].model}</span>`).join('');
  const intentHtml = intent ? `<span class="round-intent" title="${intent.replace(/"/g,'&quot;')}">“${intent}”</span>` : '';
  el.innerHTML=`
    <div class="round-head">
      <span class="round-no">ROUND ${n}</span>
      ${intentHtml}
      <span class="round-status" data-status>opening statements…</span>
      ${chips}
    </div>
    <div class="grid3">
      ${ROLEMETA.map(r=>`
        <div class="panel ${r.key}">
          <div class="p-head"><span class="dot"></span>
            <div><div class="p-name">${r.name}</div><div class="p-role">${r.role}</div></div>
            <span class="state" data-state></span>
            <span class="p-model">${provLabel(snap[r.key].provider)} · ${snap[r.key].model}</span>
          </div>
          <div class="msgs" data-role="${r.key}"></div>
          ${r.key==='judge'?'<div class="verdict-bar" data-verdict></div>':''}
          <form class="p-input" data-key="${r.key}"><input placeholder="Ask the ${r.name.toLowerCase()}…" autocomplete="off"/><button type="submit">➤</button></form>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">OPTION OUTCOMES vs BASELINE</div>
      <div class="card-sub">Bybit MNTUSDT · 1h · hover for entry &amp; P/L · click chip to toggle · double-click to isolate</div>
      <div class="legend"></div>
      <div class="chartbox"><svg class="chart" viewBox="0 0 900 240" preserveAspectRatio="none"></svg><div class="tip"></div></div>
    </div>
    <div class="opts"></div>`;
  return el;
}

async function runRound(el,seed){
  initChart(el,seed);
  const opts=renderOpts(el,seed);
  // per-panel chat
  el.querySelectorAll('.p-input').forEach(form=>{
    form.addEventListener('submit',async e=>{e.preventDefault();const key=form.dataset.key,inp=form.querySelector('input'),txt=inp.value.trim();if(!txt)return;inp.value='';const box=el.querySelector(`.msgs[data-role="${key}"]`);const u=document.createElement('div');u.className='msg user';u.textContent=txt;box.appendChild(u);autoscroll(box);await new Promise(r=>setTimeout(r,320));await streamInto(el,key,REPLY[key],null,28);});
  });

  // PHASE 1 - both opening statements stream in PARALLEL; judge waits
  setState(el,'judge','waiting','awaiting debate');
  setState(el,'supporter','speaking'); setState(el,'discriminator','speaking');
  await Promise.all([
    streamInto(el,'supporter',OPENING.supporter,null,30),
    streamInto(el,'discriminator',OPENING.discriminator,null,30),
  ]);

  // PHASE 2 - turn-taking debate: one speaks, the other waits
  el.querySelector('[data-status]').textContent='debating - taking turns…';
  for(const turn of DEBATE){
    const other = turn.who==='supporter'?'discriminator':'supporter';
    setState(el,turn.who,'speaking');
    setState(el,other,'waiting','considering rebuttal');
    await new Promise(r=>setTimeout(r,500));           // brief "thinking" beat
    await streamInto(el,turn.who,turn.text,turn.replyTo,30);
    await new Promise(r=>setTimeout(r,260));
  }
  setState(el,'supporter',null); setState(el,'discriminator',null);

  // PHASE 3 - judge rules
  el.querySelector('[data-status]').textContent='judge ruling…';
  setState(el,'judge','speaking');
  await new Promise(r=>setTimeout(r,400));
  await streamInto(el,'judge',RULING,null,24);
  setState(el,'judge',null);
  const top=[...opts].sort((a,b)=>b.conf-a.conf)[0];
  const vb=el.querySelector('[data-verdict]'); vb.style.display='flex';
  vb.textContent=`✓ Verdict: ${top.dir.toUpperCase()} ${top.id} - confidence ${top.conf}%`;
  el.querySelector('[data-status]').textContent='verdict ready';
}

function runEvaluation(){
  roundCount++;
  // read the user's intent from IntentStep (fall back to last known)
  if(window.IntentStep && window.IntentStep.getIntent){
    const it=window.IntentStep.getIntent();
    if(it) currentIntent=it;
  }
  const snap=snapshotRoles();
  const el=buildRound(roundCount,snap,currentIntent);
  document.getElementById('rounds').appendChild(el);
  document.getElementById('statusPill').textContent='ROUND '+roundCount;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  runRound(el,roundCount-1);
}

/* ---------- boot ---------- */
function boot(){
  // Build the shell first so #intent-step and #model-config exist.
  Flow.init({ onGenerate: runEvaluation });
  // Mount the intent panel and the model picker into the shell's Step-1 slots.
  IntentStep.mount(document.getElementById('intent-step'));
  buildConfigBar();   // mounts TribunalModels picker into #model-config
  // NOTE: runEvaluation() is intentionally NOT called here.
  // The first round only runs when the user types an intent and clicks Generate.
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
